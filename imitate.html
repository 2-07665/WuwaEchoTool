<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>声骸模拟开词条</title>
    <link href="library/bootstrap/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="library/bootstrap/css/bootstrap-grid.min.css" rel="stylesheet"/>
    <link href="library/bootstrap/css/bootstrap-reboot.min.css" rel="stylesheet"/>
    <link href="css/base.css" rel="stylesheet"/>
    <link rel="icon" href="image/favicon.ico" type="image/x-icon"/>
    <!--  作者：哲字君  2024-08-02  !-->
</head>
<body>
<div class="mc-main-page">
    <!--  header  !-->
    <div class="mc-title">
        <span class="mc-title-name">声骸模拟开词条</span>
    </div>
    <div class="mc-costedit">
        <div class="mc-costedit-info">
            <div class="mc-cost-img-0" id="shimg" data-toggle="modal" data-target="#mc-addcost">
                <!--<img id="shimg01" class="mc-character-imgCost" src="image/role/jx.png" alt="选择的角色">!-->
                <img id="shimg01" data-toggle="modal" class="mc-cost-img" src="image/cost/000.png" alt="选择的声骸">
            </div>
            <div class="mc-cost-right mc-cost-right2">
                <div class="mc-cost-addbtn" id="mc-kqct">开 启&nbsp;词&nbsp;条</div>
                <div class="mc-cost-addbtn mc-cost-addbtn3" id="mc-czct">重 置&nbsp;词&nbsp;条</div>
            </div>
        </div>
        <table id="fct-list" class="table table-striped">
            <thead>
            <tr>
                <th scope="col">序号</th>
                <th scope="col">属性</th>
                <th scope="col">数值</th>
            </tr>
            </thead>
            <tbody id="chitiao-list">
            <tr>
                <td colspan="4">无副词条属性</td>
            </tr>
            </tbody>
        </table>
        <hr>
        <div class="mc-cost-prediction">
            <ul class="list-group">
                <li class="list-group-item mc-bgc-01" aria-current="true">声骸副词条概率推算</li>
                <li class="list-group-item"><span class="mc-tc-title">暴击概率：</span><span
                        class="mc-cost-jiaz2 mc-cost-red" id="gl-bj">0.00%</span></li>
                <li class="list-group-item"><span class="mc-tc-title">暴伤概率：</span><span
                        class="mc-cost-jiaz2 mc-cost-purple" id="gl-bs">0.00%</span></li>
                <li class="list-group-item"><span class="mc-tc-title">大攻击概率：</span><span
                        class="mc-cost-jiaz2 mc-cost-green" id="gl-gj">0.00%</span></li>
                <li class="list-group-item"><span class="mc-tc-title">声骸达成双爆概率：</span><span
                        class="mc-cost-jiaz2 mc-cost-blue" id="gl-sb">0.00%</span></li>
                <li class="list-group-item"><span class="mc-tc-title">下一次出生防概率：</span><span
                        class="mc-cost-jiaz2 mc-cost-pink" id="gl-sf">0.00%</span></li>
                <li class="list-group-item"><span class="mc-tc-title">未开词条得分期望：</span><span class="mc-cost-jiaz2"
                                                                                            id="gl-ysqw">0.00</span>
                </li>
            </ul>
        </div>
    </div>
    <div class="mc-btn-backhome">返&nbsp;回&nbsp;首&nbsp;页</div>
    <!--  footer  !-->
    <div class="mc-footer">原创作者@哲字君/维护者@PillowTrel-本工具免费使用 | Version: V<span id="tool-version">1.1.2</span></div>
    <!--  弹出添加声骸  !-->
    <!-- Modal -->
    <div class="modal fade" id="mc-addcost" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="modal-title" id="exampleModalLabel"><span class="badge badge-info">选择声骸</span></span>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="mc-filter">
                        类型过滤：
                        <select id="mc-filter-value" class="form-control mc-select">
                            <option value="Cost4" selected>Cost4</option>
                            <option value="Cost3">Cost3</option>
                            <option value="Cost1">Cost1</option>
                        </select>
                    </div>
                    <hr>
                    <div class="mc-fillcost-list">
                        <div data-id="0" class="mc-cost-val mcccost-reset">
                            <img class="mc-cost-img" src="image/cost/001.png" alt="cost">
                        </div>
                        <div data-id="1" class="mc-cost-val mcccost-reset">
                            <img class="mc-cost-img" src="image/cost/002.png" alt="cost">
                        </div>
                        <div data-id="2" class="mc-cost-val mcccost-reset">
                            <img class="mc-cost-img" src="image/cost/003.png" alt="cost">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="qx-btn" type="button" class="btn btn-secondary" data-dismiss="modal">关&nbsp;&nbsp;闭
                    </button>
                    <button id="qd-btn2" type="button" class="btn btn-primary">添&nbsp;&nbsp;加</button>
                </div>
            </div>
        </div>
    </div>

</div>
<script src="library/jquery.min.js" type="application/javascript"></script>
<script src="library/bootstrap/js/bootstrap.min.js" type="application/javascript"></script>
<script src="js/base.js" type="application/javascript"></script>
<script src="js/imitate.js" type="application/javascript"></script>
</body>
</html>
